<div class="w-64 h-screen bg-white border-r p-6">
  <div class="mb-8">
    <h2 class="text-lg font-bold text-emerald-600">PuraVidaCare</h2>
    <p class="text-xs text-gray-500">
      {{ role === 'admin' ? 'Panel Admin' : 'Panel Proveedor' }}
    </p>
  </div>

  <nav class="flex flex-col gap-2">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="bg-emerald-100 text-emerald-700"
       class="px-4 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">
      {{ item.label }}
    </a>
  </nav>
</div>
