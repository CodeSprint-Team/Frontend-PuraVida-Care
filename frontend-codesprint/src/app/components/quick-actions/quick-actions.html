<div class="mt-10">
  <h2 class="text-lg font-semibold mb-4">Accesos rápidos</h2>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div
      *ngFor="let action of actions"
      (click)="navigate(action.route)"
      class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition cursor-pointer flex gap-4 items-start"
    >
      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0"
        [ngClass]="{
          'bg-emerald-100 text-emerald-600': action.color === 'green',
          'bg-blue-100 text-blue-600': action.color === 'blue',
          'bg-purple-100 text-purple-600': action.color === 'purple',
          'bg-orange-100 text-orange-600': action.color === 'orange',
          'bg-pink-100 text-pink-600': action.color === 'pink',
          'bg-gray-100 text-gray-600': action.color === 'gray',
           'bg-yellow-100 text-yellow-600':   action.color === 'yellow'
        }"
      >
        <ng-icon [name]="action.icon" size="20"></ng-icon>
      </div>
      <div>
        <h3 class="font-semibold text-gray-900">{{ action.title }}</h3>
        <p class="text-gray-500 text-sm">{{ action.description }}</p>
      </div>
    </div>
  </div>
</div>
