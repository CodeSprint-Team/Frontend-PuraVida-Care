<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mt-8 mb-10">
  <div
    *ngFor="let stat of stats"
    class="bg-white rounded-xl shadow-sm p-6 flex flex-col gap-2 border border-gray-100"
  >
    <div class="flex items-center justify-between mb-2">
      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center"
        [ngClass]="{
          'bg-emerald-100 text-emerald-600': stat.color === 'emerald',
          'bg-orange-100 text-orange-600':   stat.color === 'orange',
          'bg-blue-100 text-blue-600':       stat.color === 'blue'
        }"
      >
        <ng-icon [name]="stat.icon" size="20"></ng-icon>
      </div>
    </div>
    <div class="text-2xl font-bold text-gray-900">{{ stat.value }}</div>
    <div class="text-sm text-gray-500">{{ stat.label }}</div>
  </div>
</div>
