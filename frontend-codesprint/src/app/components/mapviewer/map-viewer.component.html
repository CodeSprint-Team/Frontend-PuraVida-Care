<div class="relative w-full">

  <ng-container *ngIf="backgroundImage; else uploadPlaceholder">

    <div
      #mapContainer
      class="relative bg-gray-200 rounded-2xl overflow-hidden aspect-[4/3] select-none"
      (click)="clearSelection()">

      <!-- Imagen de fondo -->
      <img
        [src]="backgroundImage"
        alt="Mapa del lugar"
        class="absolute inset-0 w-full h-full object-cover pointer-events-none" />

      <!-- Overlay sutil -->
      <div class="absolute inset-0 bg-black/10 pointer-events-none"></div>

      <!-- Hint modo edición -->
      <div
        *ngIf="editable"
        class="absolute top-3 left-3 z-30 bg-teal-600/90 backdrop-blur-sm text-white text-xs px-3 py-1.5 rounded-full flex items-center gap-1.5">
        <i class="fa-solid fa-arrows-up-down-left-right"></i>
        Arrastra los marcadores para moverlos
      </div>

      <!-- ── Marcadores ─────────────────────────────────────────────────── -->
      <ng-container *ngFor="let marker of visibleMarkers; let i = index">
        <div
          class="absolute transform -translate-x-1/2 -translate-y-1/2 transition-[left,top]"
          [class.z-20]="selectedMarker?.id === marker.id || marker.isDragging"
          [class.z-10]="selectedMarker?.id !== marker.id && !marker.isDragging"
          [class.cursor-grab]="editable && !marker.isDragging"
          [class.cursor-grabbing]="marker.isDragging"
          [class.cursor-pointer]="!editable"
          [style.left.%]="marker.x"
          [style.top.%]="marker.y"
          [style.opacity]="marker.isDragging ? 0.75 : 1"
          (mousedown)="startDrag($event, marker)"
          (touchstart)="startDrag($event, marker)">

          <div class="relative" (click)="selectMarker(marker, $event)">

            <!-- Pulso si seleccionado -->
            <div
              *ngIf="selectedMarker?.id === marker.id"
              class="absolute inset-0 rounded-full animate-ping opacity-60"
              [class]="getLayerColor(marker.layer)">
            </div>

            <!-- Pin -->
            <div
              class="relative w-10 h-10 sm:w-12 sm:h-12 rounded-full shadow-lg flex items-center justify-center text-white border-2 border-white hover:scale-110 transition-transform"
              [class]="getLayerColor(marker.layer)">
              <span class="text-lg sm:text-xl leading-none">{{ marker.icon }}</span>
            </div>

            <!-- Badge numérico -->
            <div class="absolute -top-1 -right-1 w-5 h-5 bg-white text-gray-900 rounded-full flex items-center justify-center text-xs font-bold shadow-md">
              {{ i + 1 }}
            </div>

            <!-- Punto de estado activo -->
            <div
              *ngIf="marker.status === 'activo'"
              class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
            </div>
          </div>

          <!-- Label flotante (solo si NO está seleccionado y NO en modo edición) -->
          <div
            *ngIf="selectedMarker?.id !== marker.id && !editable"
            class="absolute top-14 left-1/2 -translate-x-1/2 whitespace-nowrap pointer-events-none hidden sm:block">
            <div class="bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg shadow-md text-xs font-medium text-gray-800">
              {{ marker.title }}
            </div>
          </div>

          <!-- Hint drag (solo modo edición) -->
          <div
            *ngIf="editable"
            class="absolute -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-black/70 text-white text-xs px-2 py-1 rounded-full pointer-events-none">
            <i class="fa-solid fa-arrows-up-down-left-right text-[10px]"></i>
          </div>
        </div>
      </ng-container>

      <!-- Sin marcadores visibles -->
      <div
        *ngIf="visibleMarkers.length === 0"
        class="absolute inset-0 flex items-center justify-center">
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 text-center">
          <i class="fa-solid fa-location-dot text-4xl text-gray-300 mb-2 block"></i>
          <p class="text-gray-600 text-sm">No hay marcadores visibles</p>
          <p class="text-xs text-gray-400 mt-1">Activa capas para ver marcadores</p>
        </div>
      </div>
    </div>

    <!-- Acciones de imagen (solo editable) -->
    <div *ngIf="editable" class="mt-3 flex gap-2">
      <label class="flex-1 cursor-pointer">
        <input type="file" accept="image/*" (change)="onFileChange($event)" class="hidden" />
        <div class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl text-sm text-center transition-colors">
          Cambiar foto
        </div>
      </label>
      <button
        (click)="removeImage()"
        class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-sm flex items-center gap-2 transition-colors">
        <i class="fa-solid fa-trash-can"></i>
        Eliminar
      </button>
    </div>

    <!-- Leyenda de capas -->
    <div *ngIf="showLayerBadges && layers.length" class="mt-3 flex flex-wrap gap-2">
      <div
        *ngFor="let layer of layers"
        class="flex items-center gap-1.5 px-2.5 py-1.5 bg-gray-50 rounded-lg text-xs text-gray-700">
        <div class="w-2.5 h-2.5 rounded-full" [class]="layer.color"></div>
        <span>{{ layer.name }}</span>
      </div>
    </div>
  </ng-container>

  <!-- ── Placeholder carga de imagen ───────────────────────────────────── -->
  <ng-template #uploadPlaceholder>
    <ng-container *ngIf="editable; else readonlyEmpty">
      <label class="cursor-pointer block">
        <input type="file" accept="image/*" (change)="onFileChange($event)" class="hidden" />
        <div class="bg-gray-100 hover:bg-gray-50 rounded-2xl aspect-[4/3] flex items-center justify-center transition-colors border-2 border-dashed border-gray-300">
          <div class="text-center p-6">
            <div class="w-16 h-16 bg-teal-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <i class="fa-solid fa-cloud-arrow-up text-2xl text-teal-600"></i>
            </div>
            <h4 class="font-semibold text-gray-900 mb-1">Subí una foto del lugar</h4>
            <p class="text-sm text-gray-500 mb-3">JPG, PNG o WEBP • Máx. 10MB</p>
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-sm transition-colors">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              Seleccionar foto
            </div>
          </div>
        </div>
      </label>
    </ng-container>

    <!-- Vista de solo lectura sin imagen -->
    <ng-template #readonlyEmpty>
      <div class="bg-gray-100 rounded-2xl aspect-[4/3] flex items-center justify-center">
        <div class="text-center p-6">
          <i class="fa-solid fa-map text-4xl text-gray-300 mb-2 block"></i>
          <p class="text-sm text-gray-500">El mapa no tiene imagen configurada</p>
        </div>
      </div>
    </ng-template>
  </ng-template>

</div>
