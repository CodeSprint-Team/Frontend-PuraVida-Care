<div class="min-h-screen bg-gray-50">
  <app-navbar></app-navbar>

  <main class="lg:ml-64 pb-24 lg:pb-8">
    <div class="container mx-auto px-6 py-8 max-w-2xl">

      <button (click)="goBack()"
        class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition">
        <ng-icon name="heroArrowLeft" class="text-xl"></ng-icon>
        <span class="font-medium">Volver a mis servicios</span>
      </button>

      <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100">

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Dejar una reseña</h1>
        <p class="text-sm text-gray-500 mb-6">Compartí tu experiencia con este proveedor</p>

        <!-- Info del servicio -->
        <div *ngIf="providerName || serviceTitle"
             class="bg-gray-50 rounded-xl p-4 mb-8 border border-gray-100">
          <p class="font-semibold text-gray-900">{{ providerName }}</p>
          <p class="text-sm text-gray-500">{{ serviceTitle }}</p>
        </div>

        <!-- Estrellas -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-3">Calificación</label>
          <div class="flex gap-3 items-center">
            <div class="flex gap-1">
              <button *ngFor="let star of starsArray"
                (click)="setRating(star)"
                (mouseenter)="setHover(star)"
                (mouseleave)="clearHover()"
                class="text-4xl transition-all duration-150 hover:scale-110 cursor-pointer"
                [ngClass]="(hoverRating || rating) >= star
                  ? 'text-yellow-400 drop-shadow-sm'
                  : 'text-gray-200'">
                ★
              </button>
            </div>
            <span *ngIf="rating > 0"
                  class="text-sm font-medium px-3 py-1 rounded-full"
                  [ngClass]="{
                    'bg-red-50 text-red-700': rating <= 2,
                    'bg-yellow-50 text-yellow-700': rating === 3,
                    'bg-green-50 text-green-700': rating >= 4
                  }">
              {{ ratingLabel }}
            </span>
          </div>
        </div>

        <!-- Comentario -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-2">Comentario</label>
          <textarea [(ngModel)]="comment"
            rows="5"
            placeholder="Contá cómo fue tu experiencia con el servicio..."
            class="w-full px-4 py-3 border border-gray-200 rounded-xl
                   outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500
                   transition text-sm resize-none">
          </textarea>
          <p class="text-xs text-gray-400 mt-1.5 text-right">
            {{ comment.length }} caracteres
          </p>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage"
             class="bg-red-50 border border-red-200 rounded-xl p-4 mb-5">
          <p class="text-red-700 text-sm">{{ errorMessage }}</p>
        </div>

        <!-- Éxito -->
        <div *ngIf="successMessage"
             class="bg-green-50 border border-green-200 rounded-xl p-4 mb-5">
          <p class="text-green-700 text-sm flex items-center gap-2">
            ✓ {{ successMessage }}
          </p>
        </div>

        <!-- Botón -->
        <button (click)="submit()"
          [disabled]="loading || !isValid || !!successMessage"
          class="w-full py-3.5 rounded-xl font-medium text-sm transition"
          [ngClass]="isValid && !loading && !successMessage
            ? 'bg-teal-700 text-white hover:opacity-85'
            : 'bg-gray-200 text-gray-400 cursor-not-allowed'">
          {{ loading ? 'Enviando...' : 'Enviar reseña' }}
        </button>

      </div>
    </div>
  </main>
</div>
