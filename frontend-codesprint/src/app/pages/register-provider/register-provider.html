<div class="min-h-screen bg-slate-50 px-4 py-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-6xl">

    <div class="mb-10 text-center sm:mb-12">
      <h1 class="text-3xl font-semibold text-slate-900 sm:text-4xl">
        Crear perfil de
        <span class="text-teal-600">Proveedor</span>
      </h1>
      <p class="mt-3 text-sm text-slate-500 sm:text-base">
        Completa la información para ofrecer tus servicios.
        Los campos marcados con <span class="text-red-500">*</span> son obligatorios.
      </p>
    </div>

    <div class="rounded-3xl bg-white p-6 shadow-sm sm:p-8 lg:p-10">
      <form [formGroup]="registerForm" (ngSubmit)="submit()" class="space-y-10">

        <!-- Datos personales -->
        <div>
          <h2 class="mb-6 text-lg font-semibold text-slate-800">Datos personales</h2>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Nombre <span class="text-red-500">*</span></label>
              <input type="text" formControlName="userName" placeholder="Nombre"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('userName') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Apellido <span class="text-red-500">*</span></label>
              <input type="text" formControlName="lastName" placeholder="Apellido"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('lastName') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Teléfono <span class="text-red-500">*</span></label>
              <input type="text" formControlName="phone" placeholder="Ej: 8888-8888"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('phone') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">Correo electrónico <span class="text-red-500">*</span></label>
              <input type="email" formControlName="email" placeholder="tu@email.com"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('email') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Zona <span class="text-red-500">*</span></label>
              <input type="text" formControlName="zone" placeholder="Ej: Escazú, San José"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('zone') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div class="md:col-span-2 xl:col-span-3">
              <label class="mb-2 block text-sm font-medium text-slate-700">Contraseña <span class="text-red-500">*</span></label>
              <div class="relative">
                <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Mínimo 8 caracteres"
                  class="w-full rounded-xl border px-4 py-3 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                  [ngClass]="isInvalid('password') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
                <button type="button" (click)="showPassword = !showPassword"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                  <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Información profesional -->
        <div>
          <h2 class="mb-6 text-lg font-semibold text-slate-800">Información profesional</h2>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Tipo de proveedor <span class="text-red-500">*</span></label>
              <div class="relative">
                <select formControlName="providerTypeId"
                  class="w-full appearance-none rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                  [ngClass]="isInvalid('providerTypeId') ? 'border-red-400 bg-red-50' : 'border-slate-300'">
                  <option [value]="1">Cuidador/a</option>
                  <option [value]="2">Enfermero/a</option>
                  <option [value]="3">Acompañante</option>
                  <option [value]="4">Terapeuta</option>
                  <option [value]="5">Chofer</option>
                </select>
              </div>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Años de experiencia <span class="text-red-500">*</span></label>
              <input type="number" formControlName="experienceYears" placeholder="0" min="0"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('experienceYears') ? 'border-red-400 bg-red-50' : 'border-slate-300'" />
            </div>

            <div class="md:col-span-2 xl:col-span-3">
              <label class="mb-2 block text-sm font-medium text-slate-700">Experiencia <span class="text-red-500">*</span></label>
              <textarea formControlName="experienceDescription" rows="3"
                placeholder="Describe tu experiencia profesional"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('experienceDescription') ? 'border-red-400 bg-red-50' : 'border-slate-300'"></textarea>
            </div>

            <div class="md:col-span-2 xl:col-span-3">
              <label class="mb-2 block text-sm font-medium text-slate-700">Biografía <span class="text-red-500">*</span></label>
              <textarea formControlName="bio" rows="3"
                placeholder="Cuéntanos un poco sobre ti"
                class="w-full rounded-xl border px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                [ngClass]="isInvalid('bio') ? 'border-red-400 bg-red-50' : 'border-slate-300'"></textarea>
            </div>
          </div>
        </div>

        <div class="flex justify-center pt-2">
          <button type="submit" [disabled]="loading"
            class="w-full max-w-sm rounded-2xl bg-teal-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:bg-teal-300 cursor-pointer">
            {{ loading ? 'Registrando...' : 'Crear cuenta' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
