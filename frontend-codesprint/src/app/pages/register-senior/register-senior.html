<div class="min-h-screen bg-slate-50 px-4 py-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">

    <!-- Header -->
    <div class="mb-10 text-center sm:mb-12">
      <h1 class="text-3xl font-semibold text-slate-900 sm:text-4xl">
        Crear perfil de
        <span class="text-teal-600">Adulto mayor</span>
      </h1>
      <p class="mt-3 text-sm text-slate-500 sm:text-base">
        Completa la información para continuar
      </p>
    </div>

    <!-- Card -->
    <div class="rounded-3xl bg-white p-6 shadow-sm sm:p-8 lg:p-10">
      <form [formGroup]="registerForm" (ngSubmit)="submit()" class="space-y-10">

        <!-- Datos personales -->
        <div>
          <h2 class="mb-6 text-lg font-semibold text-slate-800">
            Datos personales
          </h2>

          <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Nombre
              </label>
              <input type="text" formControlName="userName" class="input" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Apellido
              </label>
              <input type="text" formControlName="lastName" class="input" />
            </div>

            <div class="sm:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Correo electrónico
              </label>
              <input type="email" formControlName="email" class="input" />
            </div>

            <div class="sm:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Contraseña
              </label>
              <input type="password" formControlName="password" class="input" />
            </div>
          </div>
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">
            Teléfono
          </label>
          <input
            type="text"
            formControlName="phone"
            class="input"
          />
        </div>
        <div class="sm:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">
            Dirección
          </label>
          <input
            type="text"
            formControlName="address"
            placeholder="Ej: Escazú, San José, Costa Rica"
            class="input"
          />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">
            Edad
          </label>
          <input
            type="number"
            formControlName="age"
            min="0"
            class="input"
            placeholder="Ej: 70"
          />
        </div>
        <!-- Información de cuidado -->
        <div>
          <h2 class="mb-6 text-lg font-semibold text-slate-800">
            Información de cuidado
          </h2>

          <div class="grid grid-cols-1 gap-5">

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Preferencia de cuidado
              </label>
              <textarea
                formControlName="carePreference"
                rows="3"
                placeholder="Ej: asistencia diaria, acompañamiento, etc."
                class="input"
              ></textarea>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Observaciones de salud
              </label>
              <textarea
                formControlName="healthObservation"
                rows="3"
                placeholder="Condiciones, medicamentos, etc."
                class="input"
              ></textarea>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Notas de movilidad
              </label>
              <textarea
                formControlName="mobilityNotes"
                rows="3"
                placeholder="Ej: usa bastón, silla de ruedas, etc."
                class="input"
              ></textarea>
            </div>

          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">
              Alergias
            </label>
            <textarea
              formControlName="allergies"
              rows="3"
              placeholder="Ej: penicilina, mariscos, polvo, etc."
              class="input"
            ></textarea>
          </div>
        </div>

        <!-- Contacto de emergencia -->
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">
            Relación con el contacto de emergencia
          </label>

          <div class="relative">
            <select formControlName="emergencyRelation" class="select-input">
              <option value="">Selecciona una opción</option>
              <option value="Padre">Padre</option>
              <option value="Madre">Madre</option>
              <option value="Hijo/a">Hijo/a</option>
              <option value="Hermano/a">Hermano/a</option>
              <option value="Cónyuge">Cónyuge</option>
              <option value="Nieto/a">Nieto/a</option>
              <option value="Otro familiar">Otro familiar</option>
              <option value="Amigo/a">Amigo/a</option>
              <option value="Vecino/a">Vecino/a</option>
              <option value="Encargado/a">Encargado/a</option>
              <option value="Otro">Otro</option>
            </select>

            <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-500">
              <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.51a.75.75 0 01-1.08 0l-4.25-4.51a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
              </svg>
            </div>
          </div>
        </div>
        <div>
          <h2 class="mb-6 text-lg font-semibold text-slate-800">
            Contacto de emergencia
          </h2>

          <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Nombre del contacto
              </label>
              <input
                type="text"
                formControlName="emergencyContactName"
                class="input"
              />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">
                Teléfono
              </label>
              <input
                type="text"
                formControlName="emergencyContactPhone"
                class="input"
              />
            </div>

          </div>
        </div>

        <!-- Botón -->
        <div class="flex justify-center pt-4">
          <button
            type="submit"
            [disabled]="loading"
            class="w-full max-w-xs rounded-2xl bg-teal-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:bg-teal-300"
          >
            {{ loading ? 'Registrando...' : 'Crear cuenta' }}
          </button>
        </div>

        <!-- Mensajes -->
        <div *ngIf="errorMessage" class="text-center text-sm text-red-500">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="text-center text-sm text-green-600">
          {{ successMessage }}
        </div>

      </form>
    </div>

  </div>
</div>
