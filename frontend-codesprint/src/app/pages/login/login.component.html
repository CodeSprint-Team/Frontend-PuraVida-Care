<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-teal-600 p-5 font-sans">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md animate-fade-in">

    <h1 class="text-teal-600 text-3xl font-semibold text-center mb-2">PuraVidaCare</h1>
    <p class="text-gray-500 text-center mb-8">Inicia sesión para continuar</p>

    <!-- Google -->
    <button
      (click)="loginWithGoogle()"
      class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg bg-white text-gray-700 hover:bg-gray-50 transition-colors mb-5 cursor-pointer">
      <span class="text-xl font-bold bg-gradient-to-r from-blue-500 via-green-500 via-yellow-400 to-red-500 bg-clip-text text-transparent">G</span>
      Continuar con Google
    </button>

    <!-- Divider -->
    <div class="relative text-center my-5">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <span class="relative bg-white px-3 text-gray-400 text-sm">o</span>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu@email.com"
          class="w-full px-3 py-3 border rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
          [ngClass]="f['email'].invalid && (submitted || f['email'].touched)
            ? 'border-red-400 bg-red-50'
            : 'border-gray-300'"
        >
        <!-- Validaciones de email -->
        <div *ngIf="f['email'].invalid && (submitted || f['email'].touched)" class="mt-1.5">
          <p *ngIf="f['email'].errors?.['required']" class="text-red-500 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-exclamation"></i> El email es obligatorio
          </p>
          <p *ngIf="f['email'].errors?.['email'] || f['email'].errors?.['pattern']" class="text-red-500 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-exclamation"></i> Ingresá un email válido (ej: usuario&#64;gmail.com)
          </p>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-5">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="*********"
            class="w-full px-3 py-3 border rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent pr-10"
            [ngClass]="f['password'].invalid && (submitted || f['password'].touched)
              ? 'border-red-400 bg-red-50'
              : 'border-gray-300'"
          >
          <button type="button" (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer">
            <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
          </button>
        </div>
        <div *ngIf="f['password'].invalid && (submitted || f['password'].touched)" class="mt-1.5">
          <p *ngIf="f['password'].errors?.['required']" class="text-red-500 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-exclamation"></i> La contraseña es obligatoria
          </p>
          <p *ngIf="f['password'].errors?.['minlength']" class="text-red-500 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-exclamation"></i> Mínimo 6 caracteres
          </p>
        </div>
      </div>

      <!-- Error del servidor -->
      <div *ngIf="errorMessage"
        class="flex items-center gap-2 p-3 mb-4 rounded-lg text-sm"
        [ngClass]="{
          'bg-red-50 text-red-600 border border-red-200': errorType === 'credentials' || errorType === 'generic',
          'bg-yellow-50 text-yellow-700 border border-yellow-200': errorType === 'not_found'
        }">
        <i class="fa-solid"
          [ngClass]="errorType === 'not_found' ? 'fa-user-xmark' : 'fa-circle-exclamation'"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full py-3.5 bg-teal-600 text-white rounded-lg font-semibold text-base transition-colors mt-2 cursor-pointer"
        [ngClass]="loading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-teal-700'"
        [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <i class="fa-solid fa-spinner fa-spin"></i> Cargando...
        </span>
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-5">
      ¿No tienes cuenta?
      <a routerLink="/register/role" class="text-teal-600 font-semibold hover:underline">Regístrate</a>
    </p>
    <a routerLink="/landing" class="block text-center text-gray-400 text-sm mt-3 hover:text-teal-600 transition-colors">
      ← Volver al inicio
    </a>
  </div>
</div>
