<div class="min-h-screen bg-slate-50 px-4 py-10 sm:px-6 sm:py-14 lg:px-8">
  <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-6xl items-center justify-center">
    <div class="w-full max-w-280">
      
      <div class="mb-10 text-center sm:mb-14 lg:mb-16">
        <h1 class="mx-auto max-w-3xl text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl lg:text-5xl">
          ¿Cómo deseas usar
          <span class="text-teal-600">PuraVidaCare</span>?
        </h1>

        <p class="mx-auto mt-4 max-w-xl text-sm leading-6 text-slate-500 sm:mt-5 sm:text-base">
          Selecciona tu rol para continuar
        </p>
      </div>

      <div class="grid grid-cols-1 gap-5 sm:gap-6 lg:grid-cols-3 lg:gap-8">
        <button
          type="button"
          *ngFor="let role of roles"
          (click)="selectRole(role)"
          class="group w-full rounded-3xl border bg-white p-6 text-left shadow-sm transition-all duration-200 hover:-translate-y-1 hover:shadow-md sm:p-7 lg:min-h-65 lg:p-8"
          [ngClass]="selectedRole?.key === role.key
            ? 'border-teal-500 ring-4 ring-teal-100 shadow-md'
            : 'border-slate-200 hover:border-teal-200'"
        >
          <div
            class="mb-6 flex h-16 w-16 items-center justify-center rounded-2xl transition-colors"
            [ngClass]="getIconBgClass(role)"
          >
            <ng-container [ngSwitch]="role.key">
              <svg
                *ngSwitchCase="'CLIENT'"
                class="h-8 w-8"
                [ngClass]="getIconColorClass(role)"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>

              <svg
                *ngSwitchCase="'PROVIDER'"
                class="h-8 w-8"
                [ngClass]="getIconColorClass(role)"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 21h18"></path>
                <path d="M5 21V7l7-4 7 4v14"></path>
                <path d="M9 10h6"></path>
                <path d="M9 14h6"></path>
              </svg>

              <svg
                *ngSwitchCase="'SENIOR'"
                class="h-8 w-8"
                [ngClass]="getIconColorClass(role)"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="7" r="4"></circle>
                <path d="M8 21v-4a4 4 0 0 1 8 0v4"></path>
                <path d="M6 21h12"></path>
              </svg>
            </ng-container>
          </div>

          <h2 class="text-xl font-semibold text-slate-900 sm:text-2xl">
            {{ role.title }}
          </h2>

          <p class="mt-3 max-w-sm text-sm leading-7 text-slate-500 sm:mt-4 sm:text-base">
            {{ role.description }}
          </p>

          <div
            *ngIf="selectedRole?.key === role.key"
            class="mt-6 flex items-center gap-3 text-sm font-medium text-teal-600 sm:mt-8"
          >
            <div class="flex h-6 w-6 items-center justify-center rounded-full bg-teal-600">
              <svg
                class="h-3.5 w-3.5 text-white"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M16.704 5.29a1 1 0 0 1 .006 1.414l-7.2 7.26a1 1 0 0 1-1.42 0L3.29 9.164a1 1 0 1 1 1.414-1.414l4.096 4.096 6.493-6.55a1 1 0 0 1 1.41-.006Z"
                  clip-rule="evenodd"
                />
              </svg>
            </div>
            <span>Seleccionado</span>
          </div>
        </button>
      </div>

      <div class="mt-10 flex justify-center sm:mt-12 lg:mt-14">
        <button
          type="button"
          (click)="continue()"
          [disabled]="!selectedRole"
          class="inline-flex min-h-12 items-center justify-center rounded-2xl px-8 py-3 text-sm font-semibold text-white transition-all sm:min-w-55 sm:px-10 sm:text-base"
          [ngClass]="selectedRole
            ? 'bg-teal-600 hover:bg-teal-700 shadow-sm'
            : 'bg-teal-300 cursor-not-allowed'"
        >
          Continuar
        </button>
      </div>

      <div class="mt-8 text-center sm:mt-10">
        <a
          routerLink="/landing"
          class="inline-flex min-h-11 items-center text-sm text-slate-500 transition-colors hover:text-slate-800 sm:text-base"
        >
          ← Volver
        </a>
      </div>
    </div>
  </div>
</div>
