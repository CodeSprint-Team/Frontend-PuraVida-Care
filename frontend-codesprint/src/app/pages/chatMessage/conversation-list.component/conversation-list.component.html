<div class="min-h-screen bg-gray-50">
  <div class="container mx-auto px-4 py-6 max-w-5xl">

    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-semibold mb-1">Mensajes</h1>
      <p class="text-sm text-gray-600">Conversaciones con tus proveedores de servicios</p>
    </div>

    <!-- Search -->
    <div class="relative mb-4">
      <ng-icon name="heroMagnifyingGlass"
               class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">
      </ng-icon>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Buscar conversación..."
        class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl
               focus:outline-none focus:ring-2 focus:ring-teal-600 text-sm"
      />
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-12 text-gray-400 text-sm">
      Cargando conversaciones...
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
      <p class="text-red-700 text-sm">{{ errorMessage }}</p>
    </div>

    <!-- Conversation cards -->
    <div class="space-y-3" *ngIf="!loading && filtered.length > 0; else emptyState">
      <button
        *ngFor="let conv of filtered"
        (click)="openChat(conv)"
        class="w-full bg-white rounded-2xl shadow-sm p-4 hover:shadow-md
               transition-all text-left relative overflow-hidden"
      >
        <div class="flex items-start gap-4">
          <!-- Avatar -->
          <img
            [src]="getOtherAvatar(conv)"
            [alt]="getOtherName(conv)"
            class="w-14 h-14 rounded-xl object-cover bg-teal-100 flex-shrink-0"
          />

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-base truncate mb-0.5">
              {{ getOtherName(conv) }}
            </h3>

            <p class="text-sm mb-1 line-clamp-2 text-gray-600">
              {{ conv.lastMessage }}
            </p>

            <span class="text-xs text-gray-400">{{ formatTime(conv.lastMessageTime) }}</span>
          </div>
        </div>
      </button>
    </div>

    <!-- Empty state -->
    <ng-template #emptyState>
      <div *ngIf="!loading" class="bg-white rounded-2xl shadow-sm p-12 text-center">
        <ng-icon name="heroChatBubbleLeftRight"
                 class="text-gray-400 text-5xl mx-auto mb-4">
        </ng-icon>
        <h3 class="text-lg mb-2">No hay conversaciones</h3>
        <p class="text-sm text-gray-600">
          {{ searchQuery ? 'No se encontraron resultados' : 'Tus conversaciones aparecerán aquí' }}
        </p>
      </div>
    </ng-template>

  </div>
</div>
