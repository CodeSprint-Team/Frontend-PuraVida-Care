<div class="flex h-screen bg-gray-50">

  <app-navbar></app-navbar>

  <div class="flex flex-col flex-1 lg:ml-64 min-w-0">

    <!-- Header -->
    <div class="bg-white border-b px-4 py-3 flex items-center gap-3 shadow-sm flex-shrink-0">
      <a routerLink="/mensajes">
        <ng-icon name="heroArrowLeft" class="text-gray-600 text-xl"></ng-icon>
      </a>
      <img
        [src]="providerAvatar || 'https://ui-avatars.com/api/?name=U&background=0d9488&color=fff'"
        class="w-10 h-10 rounded-xl object-cover bg-teal-100"
        alt="avatar"
      />
      <div>
        <h2 class="font-semibold text-sm leading-tight">{{ providerName }}</h2>
        <p class="text-xs" [ngClass]="connected ? 'text-teal-600' : 'text-gray-400'">
          {{ connected ? 'En línea' : 'Conectando...' }}
        </p>
      </div>
    </div>

    <!-- Messages -->
    <div #messageContainer class="flex-1 overflow-y-auto px-4 py-4 space-y-3">

      <!-- Skeleton loading -->
      <ng-container *ngIf="loading">
        <div *ngFor="let i of [1,2,3,4]" class="flex animate-pulse"
             [ngClass]="i % 2 === 0 ? 'justify-end' : 'justify-start'">
          <div [ngClass]="i % 2 === 0 ? 'bg-teal-200' : 'bg-gray-200'"
               class="h-10 rounded-2xl"
               [style.width]="(i * 17 + 40) + '%'">
          </div>
        </div>
      </ng-container>

      <!-- Estado vacío -->
      <div *ngIf="!loading && messages.length === 0"
           class="text-center text-gray-400 text-sm mt-10">
        No hay mensajes aún. ¡Enviá el primero!
      </div>

      <!-- Mensajes -->
      <div
        *ngFor="let msg of messages"
        class="flex"
        [ngClass]="isOwn(msg) ? 'justify-end' : 'justify-start'"
      >
        <!-- Avatar del otro — foto real -->
        <img
          *ngIf="!isOwn(msg)"
          [src]="getAvatar(msg)"
          class="w-8 h-8 rounded-lg object-cover mr-2 flex-shrink-0 self-end"
          alt="avatar"
        />

        <div class="max-w-xs lg:max-w-md">
          <p *ngIf="!isOwn(msg)" class="text-xs text-gray-500 mb-1 ml-1">
            {{ msg.senderName }}
          </p>

          <div
            class="px-4 py-2.5 rounded-2xl text-sm"
            [ngClass]="isOwn(msg)
              ? 'bg-teal-600 text-white rounded-br-sm'
              : 'bg-white text-gray-900 shadow-sm rounded-bl-sm'"
          >
            {{ msg.content }}
          </div>

          <p class="text-xs text-gray-400 mt-1"
             [ngClass]="isOwn(msg) ? 'text-right mr-1' : 'ml-1'">
            {{ msg.sentAt | date:'shortTime' }}
          </p>
        </div>
      </div>

    </div>

    <!-- Input bar -->
    <div class="bg-white border-t px-4 py-3 flex items-center gap-3 flex-shrink-0">
      <input
        type="text"
        [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()"
        placeholder="Escribe un mensaje..."
        class="flex-1 bg-gray-100 rounded-xl px-4 py-2.5 text-sm
               focus:outline-none focus:ring-2 focus:ring-teal-600"
      />
      <button
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || !connected"
        class="w-10 h-10 bg-teal-600 disabled:bg-gray-300 text-white
               rounded-xl flex items-center justify-center transition-colors"
      >
        <ng-icon name="heroPaperAirplane" class="text-lg"></ng-icon>
      </button>
    </div>

  </div>
</div>
