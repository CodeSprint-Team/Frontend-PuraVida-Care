<div class="flex flex-col h-screen bg-gray-50">

  <!-- Header -->
  <div class="bg-white border-b px-4 py-3 flex items-center gap-3 shadow-sm">
    <a routerLink="/mensajes">
      <ng-icon name="heroArrowLeft" class="text-gray-600 text-xl"></ng-icon>
    </a>
    <img
      [src]="providerAvatar || 'https://i.pravatar.cc/150'"
      class="w-10 h-10 rounded-xl object-cover bg-teal-100"
      alt="avatar"
    />
    <div>
      <h2 class="font-semibold text-sm leading-tight">{{ providerName }}</h2>
      <p class="text-xs text-teal-600">En línea</p>
    </div>
  </div>

  <!-- Messages -->
  <div #messageContainer class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
    <div
      *ngFor="let msg of messages"
      class="flex"
      [ngClass]="isOwn(msg) ? 'justify-end' : 'justify-start'"
    >
      <!-- Avatar for others -->
      <img
        *ngIf="!isOwn(msg)"
        [src]="msg.senderAvatarUrl || 'https://i.pravatar.cc/150'"
        class="w-8 h-8 rounded-lg object-cover mr-2 flex-shrink-0 self-end"
        alt="avatar"
      />

      <div [ngClass]="isOwn(msg) ? 'max-w-xs lg:max-w-md' : 'max-w-xs lg:max-w-md'">
        <!-- Sender name for others -->
        <p *ngIf="!isOwn(msg)" class="text-xs text-gray-500 mb-1 ml-1">
          {{ msg.senderName }}
        </p>

        <!-- Bubble -->
        <div
          class="px-4 py-2.5 rounded-2xl text-sm"
          [ngClass]="isOwn(msg)
            ? 'bg-teal-600 text-white rounded-br-sm'
            : 'bg-white text-gray-900 shadow-sm rounded-bl-sm'"
        >
          {{ msg.content }}
        </div>

        <!-- Timestamp -->
        <p class="text-xs text-gray-400 mt-1"
           [ngClass]="isOwn(msg) ? 'text-right mr-1' : 'ml-1'">
          {{ msg.sentAt | date:'shortTime' }}
        </p>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="bg-white border-t px-4 py-3 flex items-center gap-3">
    <input
      type="text"
      [(ngModel)]="newMessage"
      (keyup.enter)="sendMessage()"
      placeholder="Escribe un mensaje..."
      class="flex-1 bg-gray-100 rounded-xl px-4 py-2.5 text-sm
             focus:outline-none focus:ring-2 focus:ring-teal-600"
    />
    <button
      (click)="sendMessage()"
      [disabled]="!newMessage.trim()"
      class="w-10 h-10 bg-teal-600 disabled:bg-gray-300 text-white
             rounded-xl flex items-center justify-center transition-colors"
    >
      <ng-icon name="heroPaperAirplane" class="text-lg"></ng-icon>
    </button>
  </div>

</div>
